{% extends 'base.html' %}

{% block title %}轉社單_首頁{% endblock %}

{% block main %}
<section class="hero-panel panel">
    <div>
        <p class="eyebrow">社團轉社管理</p>
        <h1>歡迎使用轉社服務</h1>
        <p>依序註冊社團、使用者，建立申請表並查看社團名單。</p>
    </div>
    <div class="action-grid">
        {% if not user.is_authenticated %}
        <a class="card-link" href="{% url 'register' %}"> 使用者註冊</a>
        <a class="card-link" href="{% url 'login' %}">登入</a>
        {% else %}
        <form action="{% url 'logout' %}" method="post"> <!--action="把資料送到哪"-->
            {% csrf_token %}
            Hi! {{ user }}
            目前所屬社團:{{user_li.club}}
            <br />
            <input type="submit" value="登出">
        </form>
        {% endif %}
        <a class="card-link" href="{% url 'register' %}">使用者註冊</a>
        <a class="card-link" href="{% url 'apply_create' %}">申請表建立</a>
        <a class="card-link" href="{% url 'club_list' %}">社團名單</a>
        <a class="card-link" href="{% url 'apply_list' %}">申請列表</a>
    </div>
</section>
{% endblock %}
