{% extends 'base.html' %}

{% block title %}申請審核頁面{% endblock %}

{% block main %}

<h2>📝 轉社單審核面板 (單號: #{{ apply.id }})</h2>
    <p>申請學生：{{ apply.user.username }}</p>
    <p>轉出社團：{{ apply.club.club_name }} ➔ 轉入社團：{{ apply.club_after.club_name }}</p>
    <hr>

    <form method="post">
        {% csrf_token %}
        
        <p><strong>請根據您的身分進行簽核：</strong></p>
        <div style="background-color: #f9f9f9; padding: 15px; border: 1px solid #ccc;">
            {{ form.as_p }}
        </div>
        
        <br>
        <button type="submit" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer;">
            確認提交審核結果
        </button>
        <a href="{% url 'apply_detail' apply.id %}" style="margin-left: 10px;">取消</a>
    </form>

{% endblock %}
