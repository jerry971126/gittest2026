{% extends 'base.html' %}

{% block title %}社團註冊{% endblock %}

{% block main %}
<section class="panel form-panel">
    <div class="panel-header">
        <h1>社團註冊</h1>
        <p>新增新的社團資訊，包含名稱與人數上限。</p>
    </div>

    <form action="" method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button button-primary">新增</button>
    </form>
</section>
{% endblock %}
