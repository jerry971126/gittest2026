{% extends 'base.html' %}

{% block title %}申請表建立{% endblock %}

{% block main %}
<section class="panel form-panel">
    <div class="panel-header">
        <h1>申請表單建立</h1>
        <p>建立新的轉社申請，選擇目標社團。</p>
    </div>

    <form action="" method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button button-primary">新增</button>
    </form>
</section>
{% endblock %}
